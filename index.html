<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twitch Message Creator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" href="./favicon.ico" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="logo">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                <path d="M4 2L2 6v14h5v3l3-3h4l6-6V2H4zm15 11l-3 3h-4l-3 3v-3H5V4h14v9z" />
                <rect x="10" y="7" width="2" height="5" />
                <rect x="15" y="7" width="2" height="5" />
            </svg>
            Twitch Message Creator
        </div>
        <button class="theme-btn" onclick="toggleTheme()">
            <span id="themeIcon">☀️</span>
            <span id="themeLabel">Modo Claro</span>
        </button>
    </header>

    <div class="container">

        <!-- FORM -->
        <div class="form-col">
            <div class="card">
                <div class="card-title">Configurar mensaje</div>

                <div class="two-col">
                    <div class="field">
                        <label>Nombre de usuario</label>
                        <input type="text" id="username" placeholder="cybernahir" value="cybernahir"
                            oninput="render()" />
                    </div>
                    <div class="field">
                        <label>Color del nombre</label>
                        <div class="color-row">
                            <input type="text" id="colorHex" value="#9147ff" maxlength="7" oninput="onHexInput()" />
                            <input type="color" id="colorPicker" value="#9147ff" oninput="onPickerInput()" />
                        </div>
                        <div class="color-dots" id="colorDots"></div>
                    </div>
                </div>

                <div class="field">
                    <label>Mensaje</label>
                    <textarea id="msgText" placeholder="Escribe el mensaje..."
                        oninput="render()">Hola cromos! cyberNahirMueve cyberNahirMueve</textarea>
                </div>

                <div class="field">
                    <label>Insignias</label>
                    <div class="badge-grid" id="badgeGrid"></div>
                </div>

                <div style="display: none;">
                    <hr />

                    <div class="field">
                        <label>Fondo del mensaje</label>
                        <select id="bgStyle" onchange="onBgChange()">
                            <option value="chat">Chat (estilo Twitch)</option>
                            <option value="dark">Negro (#0e0e10)</option>
                            <option value="transparent">Transparente (checkerboard)</option>
                            <option value="white">Blanco</option>
                            <option value="custom">Personalizado…</option>
                        </select>
                        <input type="color" id="bgCustom" value="#1a1a2e"
                            style="margin-top:8px;display:none;width:100%;height:36px;border-radius:8px;border:1px solid var(--border);cursor:pointer;"
                            oninput="render()" />
                    </div>
                </div>

            </div>
        </div>

        <!-- PREVIEW -->
        <div class="preview-col">
            <div class="card">
                <div class="card-title">Vista previa</div>

                <div class="preview-box">
                    <div id="msgRender">
                        <span style="color:#6e6e83;font-size:.8rem;">Escribe algo para ver la vista previa…</span>
                    </div>
                </div>

                <button class="dl-btn" onclick="downloadMsg()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <path d="M12 4v12m0 0l-4-4m4 4l4-4" stroke="currentColor" stroke-width="2.2"
                            stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M4 20h16" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
                    </svg>
                    Descargar mensaje (.png)
                </button>
            </div>
        </div>

    </div>
    <div style="position: fixed;bottom: 20px;left:50%;transform:translate(-50%)">
        Generated by <span style="color: #ff95ca;" class="neon">cyberteo19</span>
    </div>
    <div class="toast" id="toast"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        const PRESET_COLORS = [
            '#ff4500', '#ff6b35', '#ff69b4', '#ff0000',
            '#1e90ff', '#00b4d8', '#00c896', '#9147ff',
            '#ffd700', '#ffffff'
        ];

        const BADGES = [
            { id: 'broadcaster', label: 'Streamer', img: 'https://static-cdn.jtvnw.net/badges/v1/5527c58c-fb7d-422d-b71b-f309dcb85cc1/2' },
            { id: 'moderator', label: 'Mod', img: 'https://static-cdn.jtvnw.net/badges/v1/3267646d-33f0-4b17-b3df-f923a41db1d0/2' },
            { id: 'vip', label: 'VIP', img: 'https://static-cdn.jtvnw.net/badges/v1/b817aba4-fad8-49e2-b88a-7cc744dfa6ec/2' },
            { id: 'subscriber', label: 'Sub', img: 'https://static-cdn.jtvnw.net/badges/v1/5d9f2208-5dd8-11e7-8513-2ff4adfae661/2' },
            { id: 'founder', label: 'Fundador', img: 'https://static-cdn.jtvnw.net/badges/v1/511b78a9-ab37-472f-9569-457753bbe7d3/2' },
            { id: 'partner', label: 'Partner', img: 'https://static-cdn.jtvnw.net/badges/v1/d12a2e27-16f6-41d0-ab77-b780518f00a3/2' },
            { id: 'prime', label: 'Prime', img: 'https://static-cdn.jtvnw.net/badges/v1/bbbe0db0-a598-423e-86d0-f9fb98ca1933/2' },
            { id: 'staff', label: 'Staff', img: 'https://static-cdn.jtvnw.net/badges/v1/d97c37bd-a6f5-4c38-8f57-4e4bef88af34/2' },
            { id: 'bits', label: 'Bits', img: 'https://static-cdn.jtvnw.net/badges/v1/73b5c3fb-24f9-4a82-a852-2f475b59411c/2' },
            { id: 'artist', label: 'Artista', img: 'https://static-cdn.jtvnw.net/badges/v1/4300a897-03dc-4e83-8c0e-c332fee7057f/2' },
            { id: 'boss', label: 'Super Mod', img: 'https://static-cdn.jtvnw.net/badges/v1/0822047b-65e0-46f2-94a9-d1091d685d33/2' }
        ];

        const EMOTES = {
            'cyberNahirCool': 'https://static-cdn.jtvnw.net/emoticons/v2/emotesv2_11807af4d2ad4b5a847568f8537b86d9/default/light/1.0',
            'cyberNahirMueve': 'https://static-cdn.jtvnw.net/emoticons/v2/emotesv2_1305f1653d4247bd9b66625f9f3f8902/default/light/1.0',
            'Kappa': '😏', '4Head': '😄',
            'OMEGALUL': '🤣', 'PepeHands': '😢', 'Sadge': '😔', 'monkaS': '😰',
            'EZ': '😎', 'HeyGuys': '👋', 'BibleThump': '😭', 'ResidentSleeper': '😴',
            'FeelsBadMan': '😔', 'FeelsGoodMan': '😌', 'DansGame': '🤢',
            ':)': '🙂', ':D': '😁', ':(': '😢', ':O': '😮', ';)': '😉', '<3': '❤️',
        };

        let selectedBadges = new Set();

        document.addEventListener('DOMContentLoaded', () => {
            buildDots();
            buildBadges();
            render();
        });

        function buildDots() {
            const wrap = document.getElementById('colorDots');
            PRESET_COLORS.forEach((c, i) => {
                const d = document.createElement('div');
                d.className = 'dot' + (i === 0 ? ' active' : '');
                d.style.background = c;
                if (c === '#ffffff') d.style.outline = '1px solid #aaa';
                d.title = c;
                d.onclick = () => {
                    document.getElementById('colorHex').value = c;
                    document.getElementById('colorPicker').value = c;
                    wrap.querySelectorAll('.dot').forEach(x => x.classList.remove('active'));
                    d.classList.add('active');
                    render();
                };
                wrap.appendChild(d);
            });
        }

        function onHexInput() {
            const v = document.getElementById('colorHex').value;
            if (/^#[0-9a-f]{6}$/i.test(v)) {
                document.getElementById('colorPicker').value = v;
                render();
            }
        }
        function onPickerInput() {
            document.getElementById('colorHex').value = document.getElementById('colorPicker').value;
            render();
        }

        function buildBadges() {
            const grid = document.getElementById('badgeGrid');
            BADGES.forEach(b => {
                const chip = document.createElement('div');
                chip.className = 'badge-chip';
                chip.innerHTML = `<img src="${b.img}" alt="${b.label}"/>${b.label}`;
                chip.onclick = () => {
                    selectedBadges.has(b.id) ? selectedBadges.delete(b.id) : selectedBadges.add(b.id);
                    chip.classList.toggle('on', selectedBadges.has(b.id));
                    render();
                };
                grid.appendChild(chip);
            });
        }

        function onBgChange() {
            const s = document.getElementById('bgStyle').value;
            document.getElementById('bgCustom').style.display = s === 'custom' ? 'block' : 'none';
            render();
        }

        function getBgColor() {
            const s = document.getElementById('bgStyle').value;
            const cs = getComputedStyle(document.documentElement);
            if (s === 'chat') return cs.getPropertyValue('--chat-bg').trim();
            if (s === 'dark') return '#0e0e10';
            if (s === 'white') return '#ffffff';
            if (s === 'transparent') return null; // null = transparent for html2canvas
            if (s === 'custom') return document.getElementById('bgCustom').value;
            return '#18181b';
        }

        function getBgCss() {
            const s = document.getElementById('bgStyle').value;
            if (s === 'transparent')
                return 'repeating-conic-gradient(#888 0% 25%, #ccc 0% 50%) 0 0 / 12px 12px';
            return getBgColor() || '#18181b';
        }

        function escHtml(t) {
            return t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
        function parseText(raw) {
            return escHtml(raw).replace(/\S+/g, w => {
                const k = w.replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>');
                return EMOTES[k] ? `<span title="${k}"><img style="position:relative;top:8px;" src="${EMOTES[k]}" /></span>` : w;
            });
        }

        function render() {
            const username = document.getElementById('username').value.trim() || 'Anonymous';
            const color = document.getElementById('colorHex').value || '#9147ff';
            const text = document.getElementById('msgText').value.trim();
            const el = document.getElementById('msgRender');

            el.style.background = getBgCss();

            if (!text) {
                el.innerHTML = '<span style="color:#6e6e83;font-size:.8rem;">Escribe algo para ver la vista previa…</span>';
                return;
            }

            let html = '';

            if (selectedBadges.size > 0) {
                html += '<span class="msg-badges-inline">';
                BADGES.forEach(b => {
                    if (selectedBadges.has(b.id))
                        html += `<img src="${b.img}" alt="${b.label}" title="${b.label}" width="16" height="16" crossorigin="anonymous"/>`;
                });
                html += '</span>';
            }

            html += `<span class="msg-author-inline" style="color:${color}">${escHtml(username)}</span>`;
            html += `<span class="msg-colon-inline">:</span>`;
            html += `<span class="msg-text-inline">${parseText(text)}</span>`;

            el.innerHTML = html;
        }


        async function capture() {
            // Wait for images
            const imgs = [...document.querySelectorAll('#msgRender img')];
            await Promise.all(imgs.map(img =>
                img.complete ? Promise.resolve() :
                    new Promise(r => { img.onload = r; img.onerror = r; })
            ));

            const el = document.getElementById('msgRender');
            const bgColor = getBgColor(); // null if transparent

            return html2canvas(el, {
                backgroundColor: bgColor,
                scale: 3,
                useCORS: true,
                allowTaint: false,
                logging: false,
                imageTimeout: 8000,
            });
        }


        async function downloadMsg() {
            if (!document.getElementById('msgText').value.trim()) {
                toast('⚠️ Escribe un mensaje primero'); return;
            }
            toast('⏳ Generando imagen…');
            try {
                const canvas = await capture();
                const a = document.createElement('a');
                a.download = 'twitch-mensaje.png';
                a.href = canvas.toDataURL('image/png');
                a.click();
                toast('✅ Descargado!');
            } catch (e) {
                console.error(e);
                toast('❌ Error al generar');
            }
        }


        async function copyMsg() {
            if (!document.getElementById('msgText').value.trim()) {
                toast('⚠️ Escribe un mensaje primero'); return;
            }
            try {
                const canvas = await capture();
                canvas.toBlob(async blob => {
                    try {
                        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
                        toast('📋 ¡Copiado!');
                    } catch {
                        toast('❌ No se pudo copiar (usá Chrome)');
                    }
                }, 'image/png');
            } catch (e) { toast('❌ Error'); }
        }

        function toggleTheme() {
            const html = document.documentElement;
            const dark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', dark ? 'light' : 'dark');
            document.getElementById('themeIcon').textContent = dark ? '🌙' : '☀️';
            document.getElementById('themeLabel').textContent = dark ? 'Modo Oscuro' : 'Modo Claro';
            render();
        }

        let _tt;
        function toast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(_tt);
            _tt = setTimeout(() => el.classList.remove('show'), 2600);
        }
    </script>
</body>

</html>
